<!doctype html>
<meta charset="utf-8">
<body style="font:14px system-ui,sans-serif;padding:12px 14px;min-width:230px;margin:0">
  <b>GexSync</b>
  <div id="count" style="margin-top:6px;color:#555">counting…</div>
  <div id="tabs" style="margin-top:8px;font:12px ui-monospace,monospace"></div>
  <label style="display:block;margin-top:12px">
    Panel-collapse sync:
    <select id="panelScope" style="margin-top:4px;width:100%">
      <option value="page">By page (state / classic separate)</option>
      <option value="all">All tabs</option>
    </select>
  </label>

  <hr style="margin:12px 0;border:none;border-top:1px solid #ddd">
  <b>Replay sync</b>
  <div style="margin-top:4px;color:#777;font-size:12px">
    Set each tab's ticker, date &amp; load history first, then arm.
  </div>
  <label style="display:block;margin-top:8px">
    <input type="checkbox" id="replayArmed"> Arm transport sync
  </label>
  <div style="margin-top:6px;color:#999;font-size:11px">
    First armed tab is master; others follow. Aligns by time-of-day.
  </div>
  <label style="display:block;margin-top:8px">
    <input type="checkbox" id="replayDebug"> Debug badge (show tab id)
  </label>
  <label style="display:block;margin-top:8px">
    Play tracking:
    <select id="replayTrack" style="margin-top:4px;width:100%">
      <option value="heartbeat">Heartbeat — master pushes time (~2s), tight</option>
      <option value="onpause">On pause — resync only when paused, quiet</option>
    </select>
  </label>
  <script src="popup.js"></script>
</body>
